<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager | Willis Otieno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="task-manager.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Productivity App</p>
        <h1>Task Manager</h1>
        <p class="subtitle">Plan smarter, focus better, and keep tasks under control.</p>
      </div>
      <a class="back-link" href="Willis.html">Back to Portfolio</a>
    </header>

    <section class="panel form-panel" aria-label="Create task">
      <h2>Add a New Task</h2>
      <form id="task-form" novalidate>
        <label>
          Task title
          <input id="task-title" name="title" type="text" maxlength="100" placeholder="Example: Finalize landing page copy" required />
        </label>

        <div class="grid-two">
          <label>
            Priority
            <select id="task-priority" name="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </label>

          <label>
            Due date
            <input id="task-due" name="due" type="date" />
          </label>
        </div>

        <label>
          Notes (optional)
          <textarea id="task-notes" name="notes" rows="3" maxlength="240" placeholder="Add extra context..."></textarea>
        </label>

        <button type="submit" class="btn-primary">Add Task</button>
        <p id="form-error" class="inline-error" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel controls-panel" aria-label="Task controls">
      <div class="filters">
        <button class="chip active" data-filter="all" type="button">All</button>
        <button class="chip" data-filter="active" type="button">Active</button>
        <button class="chip" data-filter="completed" type="button">Completed</button>
      </div>

      <div class="grid-two">
        <label>
          Search
          <input id="search-input" type="search" placeholder="Search title or notes" />
        </label>

        <label>
          Sort by
          <select id="sort-select">
            <option value="created-desc">Newest first</option>
            <option value="created-asc">Oldest first</option>
            <option value="priority-desc">Priority high to low</option>
            <option value="due-asc">Due date soonest</option>
          </select>
        </label>
      </div>

      <div class="action-row">
        <p id="task-stats" class="task-stats" aria-live="polite"></p>
        <button id="clear-completed" class="btn-secondary" type="button">Clear completed</button>
      </div>
    </section>

    <section class="panel list-panel" aria-label="Task list">
      <ul id="task-list" class="task-list"></ul>
      <p id="empty-state" class="empty-state">No tasks yet. Add one to get started.</p>
      <p id="status-message" class="status-message" aria-live="polite"></p>
    </section>
  </main>

  <template id="task-item-template">
    <li class="task-item">
      <div class="task-main">
        <input class="task-toggle" type="checkbox" aria-label="Mark task complete" />
        <div class="task-content">
          <p class="task-title"></p>
          <p class="task-meta"></p>
          <p class="task-notes"></p>
        </div>
      </div>
      <div class="task-actions">
        <button class="btn-small btn-edit" type="button">Edit</button>
        <button class="btn-small btn-delete" type="button">Delete</button>
      </div>
    </li>
  </template>

  <dialog id="edit-dialog">
    <form id="edit-form" method="dialog" class="edit-form" novalidate>
      <h2>Edit Task</h2>
      <label>
        Task title
        <input id="edit-title" name="title" type="text" maxlength="100" required />
      </label>
      <div class="grid-two">
        <label>
          Priority
          <select id="edit-priority" name="priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <label>
          Due date
          <input id="edit-due" name="due" type="date" />
        </label>
      </div>
      <label>
        Notes
        <textarea id="edit-notes" name="notes" rows="3" maxlength="240"></textarea>
      </label>
      <p id="edit-error" class="inline-error" aria-live="polite"></p>
      <div class="dialog-actions">
        <button type="button" id="cancel-edit" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save Changes</button>
      </div>
    </form>
  </dialog>

  <script src="task-manager.js"></script>
</body>
</html>
